<script>
// ── Firebase module (outside React) ────────────────────────────────────────
let _db = null;
let _syncCode = null;

function parseFirebaseConfig(raw) {
  if (typeof raw !== 'string') return raw;

  // Normalise curly/smart quotes to straight quotes
  let s = raw
    .replace(/[‘’]/g, "'")
    .replace(/[“”]/g, '"');

  // Extract just the object literal if the user pasted the full Firebase snippet
  // e.g. "const firebaseConfig = { ... };" or "const app = initializeApp({ ... });"
  const objMatch = s.match(/\{[\s\S]*\}/);
  if (!objMatch) return null;
  s = objMatch[0];

  // Remove trailing commas before } or ] (invalid in JSON but valid in JS)
  s = s.replace(/,\s*([}\]])/g, '$1');

  // Try strict JSON first
  try { return JSON.parse(s); } catch(_) {}

  // Convert JS object literal (unquoted keys) to JSON
  // Quote every unquoted key: word chars at start of a value pair
  try {
    const jsonified = s
      .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g, '$1"$2":')
      .replace(/:\s*'([^'\\]*(\\.[^'\\]*)*)'/g, ': "$1"'); // single-quoted values → double
    return JSON.parse(jsonified);
  } catch(_) {}

  return null;
}

async function initFirebase(config, code) {
  try {
    // config must be a plain object — never run it through JSON.parse
    if (typeof config === 'string') config = parseFirebaseConfig(config);
    const required = ['apiKey','authDomain','projectId','appId'];
    if (!config || required.some(k => !config[k])) {
      console.error('Firebase init: missing required fields', config);
      return false;
    }
    if (firebase.apps.length > 0) {
      await Promise.all(firebase.apps.map(a => a.delete()));
    }
    firebase.initializeApp(config);
    _db = firebase.firestore();
    _syncCode = code;
    console.log('Firebase init: connected to project', config.projectId, '| syncCode:', code);
    return true;
  } catch(e) {
    console.error('Firebase init:', e);
    return false;
  }
}

async function pushSession(session) {
  if (!_db || !_syncCode) return;
  const id = `${session.date}_${session.wid}`;
  await _db.collection(`gym/${_syncCode}/sessions`).doc(id).set(session);
}

async function removeCloudSession(date, wid) {
  if (!_db || !_syncCode) return;
  await _db.collection(`gym/${_syncCode}/sessions`).doc(`${date}_${wid}`).delete();
}

async function fetchCloudSessions() {
  if (!_db || !_syncCode) return null;
  const snap = await _db.collection(`gym/${_syncCode}/sessions`).get();
  return snap.docs.map(d => d.data());
}

function mergeSessions(local, cloud) {
  const merged = [...local];
  for (const s of cloud) {
    const idx = merged.findIndex(x => x.date === s.date && x.wid === s.wid);
    if (idx >= 0) merged[idx] = s;
    else merged.push(s);
  }
  return merged.sort((a, b) => b.date.localeCompare(a.date));
}
</script>

function todayStr(){return toDateStr(new Date());}
function getMondayOfWeek(d){const day=d.getDay();const m=new Date(d);m.setDate(d.getDate()+(day===0?-6:1-day));return toDateStr(m);}
function getWeekDates(mon){const m=new Date(mon+'T00:00:00');return{Mon:toDateStr(m),Wed:toDateStr(new Date(m.getTime()+2*86400000)),Fri:toDateStr(new Date(m.getTime()+4*86400000)),Sat:toDateStr(new Date(m.getTime()+5*86400000))};}
function getTodayDay(){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];}
function formatDate(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function calcVolume(exercises){return exercises.reduce((t,ex)=>t+ex.sets.reduce((s,set)=>set.done?s+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0):s,0),0);}
function epley(w,r){if(!w||!r)return 0;return r===1?w:Math.round(w*(1+r/30)*10)/10;}
const sel = e => e.target.select(); // select-all on focus helper

function loadSessions(){try{return JSON.parse(localStorage.getItem('gym_sessions')||'[]');}catch{return[];}}
function saveSessions(s){localStorage.setItem('gym_sessions',JSON.stringify(s));}

function computeStats(sessions){
  const mon=getMondayOfWeek(new Date());
  const wDates=Object.values(getWeekDates(mon));
  const thisWeek=sessions.filter(s=>wDates.includes(s.date)).length;
  let streak=0,chk=mon;
  while(true){const wd=Object.values(getWeekDates(chk));if(sessions.filter(s=>wd.includes(s.date)).length>=4){streak++;const m=new Date(chk+'T00:00:00');m.setDate(m.getDate()-7);chk=toDateStr(m);}else break;}
  return{streak,thisWeek,total:sessions.length};
}

function getPRs(sessions){
  const prs={};
  for(const s of sessions)for(const ex of s.exercises)for(const set of ex.sets){
    if(!set.done||!set.weight)continue;
    const w=parseFloat(set.weight),r=parseInt(set.reps);
    if(!prs[ex.name]||w>prs[ex.name].weight||(w===prs[ex.name].weight&&r>prs[ex.name].reps))
      prs[ex.name]={weight:w,reps:r,date:s.date};
  }
  return prs;
}

function detectNewPRs(prev,session){
  const old=getPRs(prev);const names=[];
  for(const ex of session.exercises)for(const set of ex.sets){
    if(!set.done||!set.weight)continue;
    const w=parseFloat(set.weight);
    if(!old[ex.name]||w>old[ex.name].weight)if(!names.includes(ex.name))names.push(ex.name);
  }
  return names;
}

function getLastSession(sessions,wid){
  return sessions.filter(s=>s.wid===wid).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}

      projectId: "gym-app-ecf7a",

    };

    pushSession(updated).catch(()=>{});
    showToast('Session updated ✓');
  },[showToast]);

  const todayDay=getTodayDay();

  return(

// ── Home ───────────────────────────────────────────────────────────────────
function HomeTab({sessions,todayWorkout,onStart}){
  const stats=computeStats(sessions);
  const today=todayStr();
  const todayDone=sessions.some(s=>s.date===today);
  const weekDates=getWeekDates(getMondayOfWeek(new Date()));
  const todayDay=getTodayDay();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const nextWorkout=!todayWorkout&&WORKOUTS.find(w=>days.indexOf(w.day)>days.indexOf(todayDay));
  return(
    <div>
      <div className="stat-row">
        <div className="stat-pill"><div className="val">🔥{stats.streak}</div><div className="lbl">Week Streak</div></div>
        <div className="stat-pill"><div className="val">{stats.thisWeek}/4</div><div className="lbl">This Week</div></div>
        <div className="stat-pill"><div className="val">{stats.total}</div><div className="lbl">All Time</div></div>
      </div>
      {todayWorkout&&!todayDone&&(
        <div className="today-card">
          <div className="tc-lbl">Today's Session</div>
          <div className="tc-name">{todayWorkout.name}</div>
          <div className="tc-meta">{todayWorkout.type} · {todayWorkout.exercises.length} exercises</div>
          <button className="tc-btn" onClick={onStart}>Start Today's Workout →</button>
        </div>
      )}
      {todayDone&&<div className="done-card">✅ Today's session logged — great work!</div>}
      {!todayWorkout&&(
        <div className="rest-card">
          😴 Rest day today
          {nextWorkout&&<div style={{marginTop:4,fontSize:12}}>Next: <strong>{nextWorkout.name}</strong> on {nextWorkout.day}</div>}
        </div>
      )}
      <div className="week-header">
        <span className="week-title">This Week</span>
        <span className="week-count">{stats.thisWeek} / 4</span>
      </div>
      <div className="week-bar"><div className="week-bar-fill" style={{width:`${(stats.thisWeek/4)*100}%`}}/></div>
      <div className="week-grid">
        {WORKOUTS.map(w=>{
          const done=sessions.some(s=>s.date===weekDates[w.day]);
          const isToday=w.day===todayDay;
          return(
            <div key={w.id} className={`day-card${done?' done':''}${isToday?' today':''}`}>
              <div className="dc-day">{w.day}</div>
              <div className="dc-name">{w.name}</div>
              <div className={`dc-type ${TYPE_CLS[w.type]}`}>{w.type}</div>
              <div className="dc-chk">{done?'✅':''}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Log ────────────────────────────────────────────────────────────────────
function LogTab({sessions,onSave}){
  const [phase,setPhase]=useState('pick');
  const [ls,setLs]=useState(null);
  const [logDate,setLogDate]=useState(todayStr());
  const [reviewPRs,setReviewPRs]=useState([]);
  const [finalVol,setFinalVol]=useState(0);

  function startWorkout(workout){
    const prev=getLastSession(sessions,workout.id);
    const prevMap={};
    if(prev)for(const ex of prev.exercises)prevMap[ex.name]=ex.sets;
    const exercises=workout.exercises.map(ex=>{
      const ps=prevMap[ex.name]||[];
      return{name:ex.name,targetSets:ex.sets,targetReps:ex.reps,prevSets:ps,
        sets:Array.from({length:ex.sets},(_,i)=>({set:i+1,weight:ps[i]?.weight||'',reps:'',done:false}))};
    });
    setLs({workout,exercises});setPhase('log');
  }

  function upd(ei,si,field,val){
    setLs(p=>({...p,exercises:p.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,[field]:val})})}));
  }
  function adj(ei,si,delta){
    const cur=parseFloat(ls.exercises[ei].sets[si].weight)||0;
    const next=Math.max(0,Math.round((cur+delta)*2)/2);
    upd(ei,si,'weight',next===0?'':String(next));
  }
  function addSet(ei){
    setLs(p=>({...p,exercises:p.exercises.map((ex,i)=>{
      if(i!==ei)return ex;
      const last=ex.sets[ex.sets.length-1];
      return{...ex,sets:[...ex.sets,{set:ex.sets.length+1,weight:last?.weight||'',reps:'',done:false}]};
    })}));
  }
  function goReview(){
    const session={date:logDate,wid:ls.workout.id,wname:ls.workout.name,
      exercises:ls.exercises.map(ex=>({name:ex.name,sets:ex.sets.map(s=>({...s}))}))};
    setFinalVol(calcVolume(session.exercises));
    setReviewPRs(detectNewPRs(sessions,session));
    setLs(p=>({...p,pending:session}));setPhase('review');
  }
  function confirmSave(){onSave(ls.pending);setPhase('done');}

  const anyDone=ls?.exercises.some(ex=>ex.sets.some(s=>s.done));

  if(phase==='done')return(
    <div className="completion">
      <div className="emo">🎉</div>
      <h2>{ls.workout.name} Complete!</h2>
      <p>Session saved for {formatDate(ls.pending.date)}.</p>
      <div className="vol">{finalVol.toLocaleString()} kg total volume</div><br/>
      <button className="finish-btn" onClick={()=>{setPhase('pick');setLs(null);setLogDate(todayStr());}}>Log Another Workout</button>
    </div>
  );

  if(phase==='review')return(
    <div>
      <div className="log-header">
        <button className="back-btn" onClick={()=>setPhase('log')}>← Edit</button>
        <span className="log-title">Review</span>
      </div>
      {reviewPRs.length>0&&<div className="pr-alert">🏆 New PR{reviewPRs.length>1?'s':''}: {reviewPRs.join(', ')}</div>}
      <div className="review-summary">
        <div style={{fontSize:12,color:'#888',marginBottom:6}}>{formatDate(logDate)}</div>
        <div className="review-vol">{finalVol.toLocaleString()} kg</div>
        <div className="review-vol-lbl">Total Volume</div>
        <div className="review-ex">
          {ls.exercises.map((ex,i)=>{
            const done=ex.sets.filter(s=>s.done).length;
            return<div key={i} className="review-ex-row"><span className="review-ex-name">{ex.name}</span><span className="review-ex-sets">{done}/{ex.sets.length} sets</span></div>;
          })}
        </div>
      </div>
      <button className="confirm-btn" onClick={confirmSave}>Confirm &amp; Save ✓</button>
      <button className="cancel-btn" onClick={()=>setPhase('log')}>← Keep Editing</button>
    </div>
  );

  if(phase==='log'&&ls)return(
    <div>
      <div className="log-header">
        <button className="back-btn" onClick={()=>setPhase('pick')}>← Back</button>
        <span className="log-title">{ls.workout.name}</span>
      </div>

      {ls.exercises.map((ex,ei)=>{
        const prevBest=(()=>{
          const ws=ex.prevSets.filter(s=>s.weight).map(s=>parseFloat(s.weight)||0);
          if(!ws.length)return null;
          const maxW=Math.max(...ws);
          const ms=ex.prevSets.find(s=>parseFloat(s.weight)===maxW);
          return`${maxW}kg × ${ms?.reps||'?'}`;
        })();
        return(
          <div key={ei} className="ex-block">
            <div className="ex-head">
              <div className="ex-head-row"><span className="ex-name">{ex.name}</span><span className="ex-target">{ex.targetSets}×{ex.targetReps}</span></div>
              <div className="ex-last">{prevBest?`Last time: ${prevBest}`:'First time 💪'}</div>
            </div>
            {ex.sets.map((set,si)=>(
              <div key={si} className={`set-row${set.done?' done-set':''}`}>
                <div className="set-num">S{set.set}</div>
                <div className="wfield">
                  <button className="adj" onClick={()=>adj(ei,si,-2.5)}>−</button>
                  <input className="winput" type="number" inputMode="decimal" placeholder="kg"
                    value={set.weight} onFocus={sel} onChange={e=>upd(ei,si,'weight',e.target.value)}/>
                  <button className="adj" onClick={()=>adj(ei,si,2.5)}>+</button>
                </div>
                <input className="rinput" type="number" inputMode="numeric" placeholder={String(ex.targetReps)}
                  value={set.reps} onFocus={sel} onChange={e=>upd(ei,si,'reps',e.target.value)}/>
                <button className={`tick${set.done?' ticked':''}`} onClick={()=>upd(ei,si,'done',!set.done)}
                  aria-label={`Set ${set.set} ${set.done?'undo':'done'}`}>{set.done?'✓':''}</button>
              </div>
            ))}
            <div className="add-set-row"><button className="add-set-btn" onClick={()=>addSet(ei)}>+ Add Set</button></div>
          </div>
        );
      })}
      <button className="finish-btn" disabled={!anyDone} onClick={goReview}>
        {anyDone?'Review & Finish →':'Tick at least one set to finish'}
      </button>
    </div>
  );

  return(
    <div>
      <div className="date-row" style={{marginBottom:14}}>
        <label>📅 Session Date</label>
        <input className="date-input" type="date" value={logDate} max={todayStr()} onChange={e=>setLogDate(e.target.value)}/>
      </div>
      <div className="slabel">Choose Workout</div>
      <div className="workout-grid">
        {WORKOUTS.map(w=>(
          <div key={w.id} className="workout-card" onClick={()=>startWorkout(w)}>
            <div className="wc-name">{w.name}</div>
            <div className={`wc-type ${TYPE_CLS[w.type]}`}>{w.type}</div>
            <div className="wc-meta">{w.exercises.length} exercises · {w.day}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Progress ───────────────────────────────────────────────────────────────
function ProgressTab({sessions,onDelete,onEdit}){
  const [selLift,setSelLift]=useState(null);
  const [editing,setEditing]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const chartRef=useRef(null);
  const chartInst=useRef(null);

  const allEx=useMemo(()=>[...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))].sort(),[sessions]);
  const active=selLift||allEx[0]||null;

  const liftData=useMemo(()=>{
    if(!active)return[];
    return sessions.filter(s=>s.exercises.some(e=>e.name===active))
      .map(s=>{const ex=s.exercises.find(e=>e.name===active);const maxW=Math.max(...ex.sets.filter(st=>st.done&&st.weight).map(st=>parseFloat(st.weight)||0));return{date:s.date,maxW:maxW>0?maxW:null};})
      .filter(d=>d.maxW!==null).sort((a,b)=>a.date.localeCompare(b.date));
  },[active,sessions]);

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    if(!liftData.length)return;
    chartInst.current=new Chart(chartRef.current,{type:'line',data:{labels:liftData.map(d=>formatDate(d.date)),datasets:[{label:'Max kg',data:liftData.map(d=>d.maxW),borderColor:'#04505e',backgroundColor:'rgba(4,80,94,0.08)',pointBackgroundColor:'#04505e',pointRadius:5,tension:0.3,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:40}},y:{ticks:{font:{size:11}},beginAtZero:false}}}});
    return()=>{if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}};
  },[liftData]);

  const last5=useMemo(()=>[...sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5),[sessions]);

  function handleExport(){
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(sessions,null,2)],{type:'application/json'}));a.download=`gym-backup-${todayStr()}.json`;a.click();
  }
  function handleImport(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      try{const imp=JSON.parse(evt.target.result);if(!Array.isArray(imp))throw 0;const merged=mergeSessions(sessions,imp);saveSessions(merged);window.location.reload();}
      catch{alert('Invalid backup file.');}
    };
    reader.readAsText(file);e.target.value='';
  }

  if(!sessions.length)return<div className="empty"><div className="emo">📈</div><p>No sessions yet.<br/>Log a workout to see progress!</p></div>;

  return(
    <div>
      {allEx.length>0&&<>
        <div className="slabel">Lift Progress</div>
        <div className="lift-btns">{allEx.map(n=><button key={n} className={`lift-btn${active===n?' active':''}`} onClick={()=>setSelLift(n)}>{n}</button>)}</div>
        <div className="chart-wrap">{liftData.length>0?<canvas ref={chartRef}/>:<div className="no-data">No weight logged for {active} yet.</div>}</div>
      </>}
      <div className="slabel">Recent Sessions</div>
      {last5.map((s,i)=>{
        const vol=calcVolume(s.exercises);
        const isDel=confirmDel?.date===s.date&&confirmDel?.wid===s.wid;
        return(
          <div key={i} className="hist-item">
            <div className="hist-top">
              <div><div className="hist-date">{formatDate(s.date)}</div><div className="hist-name">{s.wname||s.wid}</div></div>
              <div className="hist-vol">{vol.toLocaleString()} kg</div>
            </div>
            <div className="hist-actions">
              <button className="edit-btn" onClick={()=>setEditing(s)}>✏️ Edit</button>
              <button className="del-btn" onClick={()=>setConfirmDel({date:s.date,wid:s.wid})}>🗑 Delete</button>
            </div>
            {isDel&&<div className="confirm-del"><p>Delete permanently?</p><button className="cy" onClick={()=>{onDelete(s.date,s.wid);setConfirmDel(null);}}>Delete</button><button className="cn" onClick={()=>setConfirmDel(null)}>Cancel</button></div>}
          </div>
        );
      })}
      <div className="data-section">
        <h3>Data Backup</h3>
        <div className="data-btns">
          <button className="data-btn" onClick={handleExport}>⬇️ Export</button>
          <label className="data-btn" style={{cursor:'pointer'}}>⬆️ Import<input type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/></label>
          <button className="data-btn danger" onClick={()=>window.confirm('Delete ALL data? Cannot be undone.')&&(saveSessions([]),window.location.reload())}>🗑 Clear</button>
        </div>
      </div>
      {editing&&<EditModal session={editing} onSave={s=>{onEdit(s);setEditing(null);}} onClose={()=>setEditing(null)}/>}
    </div>
  );
}

// ── Edit Modal ─────────────────────────────────────────────────────────────

  function upd(ei,si,field,val){setEx(p=>p.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,[field]:val})}));}
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-hdr"><h3>Edit — {session.wname||session.wid}</h3><button className="modal-close" onClick={onClose}>✕</button></div>
        <div style={{fontSize:12,color:'#888',marginBottom:12}}>{formatDate(session.date)}</div>
        {exercises.map((ex,ei)=>(
          <div key={ei} className="ex-block">
            <div className="ex-head"><div className="ex-name">{ex.name}</div></div>
            {ex.sets.map((set,si)=>(
              <div key={si} className={`set-row${set.done?' done-set':''}`}>
                <div className="set-num">S{set.set}</div>
                <div className="wfield"><input className="winput" style={{flex:1}} type="number" inputMode="decimal" placeholder="kg" value={set.weight} onFocus={sel} onChange={e=>upd(ei,si,'weight',e.target.value)}/></div>
                <input className="rinput" type="number" inputMode="numeric" value={set.reps} onFocus={sel} onChange={e=>upd(ei,si,'reps',e.target.value)}/>
                <button className={`tick${set.done?' ticked':''}`} onClick={()=>upd(ei,si,'done',!set.done)}>{set.done?'✓':''}</button>
              </div>
            ))}
          </div>
        ))}
        <button className="modal-save" onClick={()=>onSave({...session,exercises})}>Save Changes</button>
      </div>
    </div>
  );
}

// ── Settings Modal ─────────────────────────────────────────────────────────
function SettingsModal({onClose,onConnected}){
  const [cfgText,setCfgText]=useState(localStorage.getItem('gym_fb_config')||'');
  const [code,setCode]=useState(localStorage.getItem('gym_sync_code')||'');
  const [status,setStatus]=useState(''); // '' | 'saving' | 'ok' | 'err'
  const [errMsg,setErrMsg]=useState('');

  async function handleSave(){
    if(!cfgText.trim()||!code.trim()){setErrMsg('Both fields required.');return;}
    setStatus('saving');setErrMsg('');
    const ok=await initFirebase(cfgText,code);
    if(!ok){setStatus('err');setErrMsg('Invalid Firebase config — check the JSON and try again.');return;}
    try{
      await fetchCloudSessions();
      localStorage.setItem('gym_fb_config',cfgText);
      localStorage.setItem('gym_sync_code',code.trim());
      setStatus('ok');
      onConnected();
    }catch(e){
      setStatus('err');
      setErrMsg('Connection failed. Make sure Firestore is enabled and in test mode.');
    }
  }

  function handleDisconnect(){
    localStorage.removeItem('gym_fb_config');localStorage.removeItem('gym_sync_code');
    _db=null;_syncCode=null;
    setCfgText('');setCode('');setStatus('');setErrMsg('');
  }

  const hasSaved=!!localStorage.getItem('gym_fb_config');

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-hdr"><h3>⚙️ Settings</h3><button className="modal-close" onClick={onClose}>✕</button></div>

        <div className="settings-h4">Cross-Device Sync</div>
        <p className="settings-desc">
          Sync your data between phone and PC using your own free Firebase project.
          Setup takes about 5 minutes and you only do it once.
        </p>

        <div className="setup-steps">
          <div>1. Go to <strong>console.firebase.google.com</strong></div>
          <div>2. Create a project (any name, disable Analytics)</div>
          <div>3. Click <strong>Add app → Web</strong>, give it a name, copy the <code>firebaseConfig</code> object</div>
          <div>4. Go to <strong>Firestore Database → Create database → Start in test mode</strong></div>
          <div>5. Paste the config below and pick a sync code</div>
        </div>

        <label className="settings-lbl">Firebase Config <span>(paste the firebaseConfig JSON)</span></label>
        <textarea className="settings-ta" value={cfgText} onChange={e=>setCfgText(e.target.value)}
          placeholder={'{\n  "apiKey": "AIza...",\n  "authDomain": "myapp.firebaseapp.com",\n  "projectId": "myapp",\n  "storageBucket": "myapp.appspot.com",\n  "messagingSenderId": "123456789",\n  "appId": "1:123456:web:abc"\n}'}/>

        <label className="settings-lbl" style={{marginTop:12}}>Sync Code <span>(same on all your devices, like a password)</span></label>
        <input className="settings-input" type="text" value={code} onChange={e=>setCode(e.target.value)} placeholder="e.g. lewis-gym-2024"/>

        {status==='ok'&&<div className="settings-ok">✅ Connected! Your data will sync across devices.</div>}
        {status==='err'&&<div className="settings-err">⚠️ {errMsg}</div>}
        {!status&&errMsg&&<div className="settings-err">⚠️ {errMsg}</div>}

        <button className="modal-save" onClick={handleSave} disabled={status==='saving'}>
          {status==='saving'?'Connecting…':'Save & Connect'}
        </button>

        {hasSaved&&<button className="disconnect-btn" onClick={handleDisconnect}>Disconnect sync</button>}

        <hr className="divider"/>
        <div style={{fontSize:12,color:'#888',textAlign:'center'}}>
          All data is also stored locally on this device.<br/>Sync only requires internet when saving or opening the app.
        </div>
      </div>
    </div>
  );
}

// ── PRs ────────────────────────────────────────────────────────────────────
function PRsTab({sessions}){
  const prs=useMemo(()=>getPRs(sessions),[sessions]);
  const list=Object.entries(prs).sort((a,b)=>b[1].weight-a[1].weight);
  if(!list.length)return<div className="empty"><div className="emo">🏆</div><p>No PRs yet.<br/>Log your first workout to start tracking!</p></div>;
  return(
    <div>
      <div className="slabel">Personal Records</div>
      <div className="pr-grid">
        {list.map(([name,pr])=>{
          const e1rm=epley(pr.weight,pr.reps);
          return(
            <div key={name} className="pr-card">
              <div className="pr-badge">PR</div>
              <div className="pr-name">{name}</div>
              <div><span className="pr-weight">{pr.weight}</span><span className="pr-unit">kg</span></div>
              <div className="pr-reps">{pr.reps} reps</div>
              {e1rm>pr.weight&&<div className="pr-1rm">~{e1rm}kg est. 1RM</div>}
              <div className="pr-date">{formatDate(pr.date)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
